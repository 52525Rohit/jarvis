<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#020c18">
<title>J.A.R.V.I.S</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --blue:#00d4ff; --blue2:#0088cc; --gold:#ffaa00;
  --red:#ff3355; --dark:#020c18; --panel:rgba(0,30,60,0.75);
  --glow:0 0 20px rgba(0,212,255,0.4);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;width:100%;overflow:hidden;background:var(--dark);color:var(--blue);font-family:'Rajdhani',sans-serif;}

body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,212,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.04) 1px,transparent 1px);
  background-size:40px 40px;animation:gridPulse 8s ease-in-out infinite;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:600px;height:600px;background:radial-gradient(circle,rgba(0,212,255,.07) 0%,transparent 70%);
  pointer-events:none;animation:breathe 4s ease-in-out infinite;z-index:0;}
@keyframes gridPulse{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes breathe{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.6}50%{transform:translate(-50%,-50%) scale(1.2);opacity:1}}

.corner{position:fixed;width:32px;height:32px;opacity:.4;z-index:1;}
.corner::before,.corner::after{content:'';position:absolute;background:var(--blue);}
.corner::before{width:100%;height:2px;top:0;left:0;}
.corner::after{width:2px;height:100%;top:0;left:0;}
.tl{top:8px;left:8px}.tr{top:8px;right:8px;transform:scaleX(-1)}.bl{bottom:8px;left:8px;transform:scaleY(-1)}.br{bottom:8px;right:8px;transform:scale(-1)}

.app{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;padding:12px 14px 10px;}

.header{text-align:center;margin-bottom:7px;animation:fadeDown .8s ease;flex-shrink:0;}
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
.header h1{font-family:'Orbitron',monospace;font-size:clamp(1.1rem,4vw,2rem);font-weight:900;letter-spacing:.28em;color:var(--blue);text-shadow:var(--glow);}
.header p{font-size:clamp(.5rem,1.4vw,.7rem);letter-spacing:.16em;color:rgba(0,212,255,.45);margin-top:2px;text-transform:uppercase;}

.core-wrap{position:relative;cursor:pointer;margin:3px 0;flex-shrink:0;text-align:center;-webkit-tap-highlight-color:transparent;user-select:none;}
.core{width:clamp(68px,11vw,95px);height:clamp(68px,11vw,95px);border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;margin:0 auto;}
.ring{position:absolute;border-radius:50%;border:2px solid transparent;animation:spin linear infinite;}
.r1{inset:0;border-top-color:var(--blue);border-right-color:rgba(0,212,255,.2);animation-duration:2s;}
.r2{inset:12%;border-bottom-color:var(--gold);border-left-color:rgba(255,170,0,.2);animation-duration:3s;animation-direction:reverse;}
.r3{inset:22%;border-top-color:var(--blue2);animation-duration:1.5s;}
.core-dot{width:38%;height:38%;border-radius:50%;background:radial-gradient(circle,#fff 0%,var(--blue) 40%,var(--blue2) 100%);
  box-shadow:0 0 22px var(--blue),0 0 45px rgba(0,212,255,.3);animation:cpulse 2s ease-in-out infinite;z-index:1;transition:transform .15s;}
.core-wrap:hover .core-dot{transform:scale(1.1);}
.core-wrap:active .core-dot{transform:scale(.9);}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes cpulse{0%,100%{box-shadow:0 0 18px var(--blue),0 0 36px rgba(0,212,255,.25)}50%{box-shadow:0 0 34px var(--blue),0 0 68px rgba(0,212,255,.5)}}
.core-label{font-family:'Orbitron',monospace;font-size:clamp(.42rem,1.1vw,.52rem);letter-spacing:.13em;color:rgba(0,212,255,.5);margin-top:4px;}

/* Language toggle */
.lang-row{display:flex;align-items:center;gap:8px;margin:4px 0 6px;flex-shrink:0;}
.lang-btn{font-family:'Orbitron',monospace;font-size:clamp(.48rem,1.1vw,.58rem);letter-spacing:.08em;
  padding:4px 10px;border:1px solid rgba(0,212,255,.3);background:transparent;color:rgba(0,212,255,.5);
  cursor:pointer;border-radius:2px;transition:all .2s;-webkit-tap-highlight-color:transparent;}
.lang-btn.active{border-color:var(--blue);color:var(--blue);background:rgba(0,212,255,.1);box-shadow:0 0 10px rgba(0,212,255,.2);}
.lang-sep{color:rgba(0,212,255,.25);font-size:.8rem;}

.status{display:flex;align-items:center;gap:7px;font-family:'Orbitron',monospace;
  font-size:clamp(.46rem,1.1vw,.6rem);letter-spacing:.1em;color:rgba(0,212,255,.55);margin:0 0 6px;flex-shrink:0;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--blue);box-shadow:0 0 8px var(--blue);animation:blink 1.5s ease-in-out infinite;flex-shrink:0;}
.dot.listening{background:var(--gold);box-shadow:0 0 8px var(--gold);}
.dot.speaking{background:#00ff88;box-shadow:0 0 8px #00ff88;}
.dot.error{background:var(--red);box-shadow:0 0 8px var(--red);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

.api-bar{width:100%;max-width:760px;flex-shrink:0;
  background:rgba(255,170,0,.06);border:1px solid rgba(255,170,0,.18);border-radius:3px;
  padding:6px 10px;display:flex;align-items:center;gap:8px;
  font-size:clamp(.58rem,1.3vw,.68rem);color:rgba(255,170,0,.7);margin-bottom:7px;}
.api-bar input{flex:1;background:transparent;border:none;border-bottom:1px solid rgba(255,170,0,.3);
  color:var(--gold);font-family:'Rajdhani',sans-serif;font-size:16px;outline:none;padding:1px 4px;}
.api-bar input::placeholder{color:rgba(255,170,0,.28);}
.eye{cursor:pointer;opacity:.55;user-select:none;font-size:.9rem;}

.chat{width:100%;max-width:760px;flex:1;min-height:0;
  background:var(--panel);border:1px solid rgba(0,212,255,.15);border-radius:4px;
  overflow-y:auto;padding:13px;margin-bottom:8px;backdrop-filter:blur(12px);position:relative;}
.chat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--blue),var(--gold),var(--blue),transparent);
  animation:scan 3s linear infinite;}
@keyframes scan{0%{transform:scaleX(0);opacity:0}50%{transform:scaleX(1);opacity:1}100%{transform:scaleX(0);opacity:0}}

.msg{margin-bottom:12px;animation:mIn .3s ease;}
.msg.user{text-align:right;animation-name:mInR;}
@keyframes mIn{from{opacity:0;transform:translateX(-7px)}to{opacity:1;transform:translateX(0)}}
@keyframes mInR{from{opacity:0;transform:translateX(7px)}to{opacity:1;transform:translateX(0)}}
.msg-who{font-family:'Orbitron',monospace;font-size:clamp(.42rem,1vw,.52rem);letter-spacing:.16em;margin-bottom:3px;opacity:.46;}
.msg.user .msg-who{color:var(--gold);}
.msg.jarvis .msg-who{color:var(--blue);}
.bubble{display:inline-block;max-width:88%;padding:9px 12px;border-radius:2px;font-size:clamp(.82rem,2vw,.93rem);line-height:1.52;}
.msg.user .bubble{background:rgba(255,170,0,.08);border:1px solid rgba(255,170,0,.25);color:#ffe4a0;}
.msg.jarvis .bubble{background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.2);color:rgba(0,212,255,.88);}
.tdots{display:inline-flex;gap:5px;padding:9px 12px;border:1px solid rgba(0,212,255,.18);background:rgba(0,212,255,.04);}
.tdots span{width:6px;height:6px;border-radius:50%;background:var(--blue);animation:td 1.2s infinite;}
.tdots span:nth-child(2){animation-delay:.2s}.tdots span:nth-child(3){animation-delay:.4s}
@keyframes td{0%,80%,100%{transform:scale(.6);opacity:.3}40%{transform:scale(1);opacity:1}}

.controls{width:100%;max-width:760px;display:flex;gap:8px;flex-shrink:0;}
.txt-in{flex:1;background:rgba(0,15,35,.88);border:1px solid rgba(0,212,255,.2);color:var(--blue);
  padding:13px 12px;font-family:'Rajdhani',sans-serif;font-size:16px;outline:none;border-radius:2px;transition:border-color .25s;}
.txt-in::placeholder{color:rgba(0,212,255,.25);}
.txt-in:focus{border-color:rgba(0,212,255,.5);box-shadow:0 0 8px rgba(0,212,255,.08);}
.btn{background:transparent;border:1px solid var(--blue);color:var(--blue);
  padding:13px 14px;font-family:'Orbitron',monospace;font-size:clamp(.56rem,1.2vw,.66rem);
  letter-spacing:.07em;cursor:pointer;border-radius:2px;transition:all .2s;white-space:nowrap;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.btn:hover{background:rgba(0,212,255,.09);box-shadow:var(--glow);}
.btn:active{transform:scale(.95);}
.mic{border-color:var(--gold);color:var(--gold);min-width:52px;font-size:1.15rem;padding:13px;position:relative;}
.mic:hover{background:rgba(255,170,0,.09);}
.mic.on{background:rgba(255,170,0,.18);box-shadow:0 0 18px rgba(255,170,0,.35);border-color:var(--gold);}
.mic.on::after{content:'';position:absolute;inset:-4px;border-radius:3px;border:2px solid rgba(255,170,0,.5);animation:ripple 1s ease-out infinite;}
@keyframes ripple{0%{transform:scale(1);opacity:1}100%{transform:scale(1.3);opacity:0}}

.chat::-webkit-scrollbar{width:4px;}
.chat::-webkit-scrollbar-track{background:transparent;}
.chat::-webkit-scrollbar-thumb{background:rgba(0,212,255,.22);border-radius:2px;}
</style>
</head>
<body>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>

<div class="app">
  <div class="header">
    <h1>J.A.R.V.I.S</h1>
    <p>Just A Rather Very Intelligent System</p>
  </div>

  <div class="core-wrap" id="coreWrap">
    <div class="core">
      <div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div>
      <div class="core-dot"></div>
    </div>
    <div class="core-label" id="coreLabel">TAP TO SPEAK</div>
  </div>

  <!-- Language selector -->
  <div class="lang-row">
    <button class="lang-btn active" id="btnEn" onclick="setLang('en')">🇬🇧 ENGLISH</button>
    <span class="lang-sep">|</span>
    <button class="lang-btn" id="btnHi" onclick="setLang('hi')">🇮🇳 हिंदी</button>
  </div>

  <div class="status">
    <div class="dot" id="sDot"></div>
    <span id="sTxt">SYSTEM ONLINE · AWAITING COMMAND</span>
  </div>

  <div class="api-bar">
    <span>🔑</span>
    <input id="apiKey" type="password" placeholder="Paste Groq API key here...">
    <span class="eye" onclick="document.getElementById('apiKey').type=document.getElementById('apiKey').type==='password'?'text':'password'">👁</span>
  </div>

  <div class="chat" id="chat">
    <div class="msg jarvis">
      <div class="msg-who">J.A.R.V.I.S</div>
      <div class="bubble" id="welcomeMsg">Good day. I am J.A.R.V.I.S. Tap the 🎙 mic button or the reactor to speak. You can also switch to हिंदी above. How may I assist you?</div>
    </div>
  </div>

  <div class="controls">
    <input class="txt-in" id="txtIn" placeholder="Type a command..." autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="btn" id="sendBtn">SEND</button>
    <button class="btn mic" id="micBtn">🎙</button>
  </div>
</div>

<script>
// ── Config ──
const VOICE_PREFS_EN = ['Daniel','Google UK English Male','Microsoft David','Alex','Google US English Male','en-GB'];
const VOICE_PREFS_HI = ['Google हिन्दी','Lekha','Hemant','Google Hindi','hi-IN'];

// ── State ──
let currentLang = 'en';
let recog = null;
let micActive = false;
let speaking = false;
let micPermission = 'unknown'; // 'unknown' | 'granted' | 'denied'
let utt = null;
const hist = [];

// ── DOM ──
const chatEl   = document.getElementById('chat');
const txtIn    = document.getElementById('txtIn');
const sDot     = document.getElementById('sDot');
const sTxt     = document.getElementById('sTxt');
const micBtn   = document.getElementById('micBtn');
const sendBtn  = document.getElementById('sendBtn');
const coreWrap = document.getElementById('coreWrap');
const coreLabel= document.getElementById('coreLabel');
const apiKeyEl = document.getElementById('apiKey');

// ── Restore API key from session ──
(function() {
  try { const s = sessionStorage.getItem('jarvis_key'); if(s) apiKeyEl.value = s; } catch(e){}
})();
apiKeyEl.addEventListener('input', function() {
  try { sessionStorage.setItem('jarvis_key', this.value.trim()); } catch(e){}
});

// ── Check mic permission on load ──
(async function checkMicPerm() {
  try {
    if (navigator.permissions) {
      const p = await navigator.permissions.query({name:'microphone'});
      micPermission = p.state; // 'granted' | 'denied' | 'prompt'
      p.onchange = () => { micPermission = p.state; };
    }
  } catch(e) {}
})();

// ── Language ──
function setLang(lang) {
  currentLang = lang;
  document.getElementById('btnEn').classList.toggle('active', lang === 'en');
  document.getElementById('btnHi').classList.toggle('active', lang === 'hi');
  recog = null;
  if (lang === 'hi') {
    txtIn.placeholder = 'कमांड टाइप करें...';
    coreLabel.textContent = 'बोलने के लिए टैप करें';
    setStatus('online', 'सिस्टम चालू · आदेश की प्रतीक्षा');
  } else {
    txtIn.placeholder = 'Type a command...';
    coreLabel.textContent = 'TAP TO SPEAK';
    setStatus('online', 'SYSTEM ONLINE · AWAITING COMMAND');
  }
}

// ── Speech Recognition ──
function buildRecog() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.continuous = false;
  r.interimResults = false;
  r.lang = currentLang === 'hi' ? 'hi-IN' : 'en-IN';
  r.onstart = () => {
    setStatus('listening', currentLang === 'hi' ? 'सुन रहा हूँ...' : 'LISTENING...');
  };
  r.onend = () => {
    if (micActive) {
      micActive = false;
      setVUI(false);
      setStatus('online', currentLang === 'hi' ? 'सिस्टम चालू · आदेश की प्रतीक्षा' : 'SYSTEM ONLINE · AWAITING COMMAND');
    }
  };
  r.onerror = (e) => {
    micActive = false;
    setVUI(false);
    recog = null; // force rebuild next time

    let msg = '';
    if (e.error === 'not-allowed') {
      // Check if it's a file:// protocol issue
      if (location.protocol === 'file:') {
        msg = currentLang === 'hi'
          ? '⚠️ File:// से voice काम नहीं करता। इस HTML को किसी server पर open करें (जैसे VS Code Live Server या Chrome Extension)।'
          : '⚠️ Voice does not work when opened as a local file (file://). Please serve it via a local server or upload to any website.';
      } else {
        msg = currentLang === 'hi'
          ? '⚠️ Chrome में mic blocked है। Address bar के बाईं तरफ 🔒 icon पर click करें → Site Settings → Microphone → Allow करें।'
          : '⚠️ Mic is blocked in Chrome. Click the 🔒 lock icon in address bar → Site Settings → Microphone → Allow.';
      }
    } else if (e.error === 'no-speech') {
      msg = currentLang === 'hi' ? 'कोई आवाज़ नहीं मिली, फिर कोशिश करें।' : 'No speech detected. Please try again.';
    } else if (e.error === 'network') {
      msg = currentLang === 'hi' ? 'नेटवर्क त्रुटि — internet connection जांचें।' : 'Network error — check your internet connection.';
    } else if (e.error === 'audio-capture') {
      msg = currentLang === 'hi' ? 'माइक नहीं मिला। System में microphone check करें।' : 'No microphone found. Check if mic is connected.';
    } else if (e.error === 'aborted') {
      return; // user aborted, no message needed
    } else {
      msg = 'Error: ' + e.error;
    }
    addMsg('jarvis', msg);
    setStatus('error', e.error.toUpperCase());
  };
  r.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    micActive = false;
    setVUI(false);
    txtIn.value = transcript;
    sendMsg();
  };
  return r;
}

// ── Request mic permission explicitly first ──
async function requestMicAndStart() {
  // If file:// protocol, warn immediately
  if (location.protocol === 'file:') {
    const msg = currentLang === 'hi'
      ? '⚠️ File:// से voice काम नहीं करता। इस HTML को किसी server पर serve करें।'
      : '⚠️ Voice recognition does not work when opened as a local file (file://). Serve it via localhost or upload online.';
    addMsg('jarvis', msg);
    return;
  }

  // Try getUserMedia first to trigger browser's permission prompt properly
  if (micPermission !== 'granted') {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio: true});
      // Permission granted — stop the stream immediately, we don't need it
      stream.getTracks().forEach(t => t.stop());
      micPermission = 'granted';
    } catch(err) {
      micPermission = 'denied';
      const msg = currentLang === 'hi'
        ? '⚠️ Mic blocked है। Chrome में: Address bar → 🔒 → Site Settings → Microphone → Allow'
        : '⚠️ Mic blocked. In Chrome: click 🔒 in address bar → Site Settings → Microphone → Allow. Then refresh the page.';
      addMsg('jarvis', msg);
      setStatus('error', 'MIC BLOCKED');
      return;
    }
  }

  // Now start recognition
  doStartListen();
}

function doStartListen() {
  if (!recog) recog = buildRecog();
  if (!recog) {
    addMsg('jarvis', currentLang === 'hi'
      ? 'Chrome या Edge browser उपयोग करें।'
      : 'Voice recognition needs Chrome or Edge browser.');
    return;
  }
  if (speaking) { speechSynthesis.cancel(); speaking = false; }
  try {
    recog.start();
    micActive = true;
    setVUI(true);
  } catch(e) {
    recog.abort();
    recog = null;
    micActive = false;
    setVUI(false);
    setTimeout(() => {
      recog = buildRecog();
      if (recog) { try { recog.start(); micActive = true; setVUI(true); } catch(e2){} }
    }, 400);
  }
}

function stopListen() {
  if (recog) { try { recog.abort(); } catch(e){} }
  recog = null;
  micActive = false;
  setVUI(false);
  setStatus('online', currentLang === 'hi' ? 'सिस्टम चालू · आदेश की प्रतीक्षा' : 'SYSTEM ONLINE · AWAITING COMMAND');
}

function toggleListen() {
  if (micActive) { stopListen(); } else { requestMicAndStart(); }
}

// ── TTS ──
function loadVoices() { return speechSynthesis.getVoices(); }
if (window.speechSynthesis) {
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}

function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  utt = new SpeechSynthesisUtterance(text);
  const vs = speechSynthesis.getVoices();
  const prefs = currentLang === 'hi' ? VOICE_PREFS_HI : VOICE_PREFS_EN;
  let pick = null;
  for (const p of prefs) {
    pick = vs.find(v => v.name.includes(p) || v.lang === p);
    if (pick) break;
  }
  if (!pick) pick = vs.find(v => currentLang === 'hi' ? v.lang.startsWith('hi') : v.lang.startsWith('en-GB')) || vs.find(v => v.lang.startsWith('en'));
  if (pick) utt.voice = pick;
  utt.lang   = currentLang === 'hi' ? 'hi-IN' : 'en-GB';
  utt.pitch  = currentLang === 'hi' ? 1.0 : 0.88;
  utt.rate   = currentLang === 'hi' ? 0.95 : 1.0;
  utt.volume = 1;
  utt.onstart = () => { speaking = true;  setStatus('speaking', currentLang==='hi'?'जवाब दे रहा हूँ...':'J.A.R.V.I.S SPEAKING...'); };
  utt.onend   = () => { speaking = false; setStatus('online',   currentLang==='hi'?'सिस्टम चालू · आदेश की प्रतीक्षा':'SYSTEM ONLINE · AWAITING COMMAND'); };
  utt.onerror = () => { speaking = false; };
  speechSynthesis.speak(utt);
}

// ── UI helpers ──
function setStatus(type, text) {
  sDot.className = 'dot' + (type !== 'online' ? ' '+type : '');
  sTxt.textContent = text;
}
function setVUI(on) {
  micBtn.classList.toggle('on', on);
  coreLabel.textContent = on
    ? (currentLang==='hi' ? 'सुन रहा हूँ...' : 'LISTENING...')
    : (currentLang==='hi' ? 'बोलने के लिए टैप करें' : 'TAP TO SPEAK');
}
function addMsg(role, text) {
  const d = document.createElement('div');
  d.className = 'msg '+role;
  d.innerHTML = `<div class="msg-who">${role==='user'?(currentLang==='hi'?'आप':'YOU'):'J.A.R.V.I.S'}</div><div class="bubble">${esc(text)}</div>`;
  chatEl.appendChild(d);
  chatEl.scrollTop = chatEl.scrollHeight;
}
function addThinking() {
  const d = document.createElement('div');
  d.className = 'msg jarvis'; d.id = 'thinking';
  d.innerHTML = `<div class="msg-who">J.A.R.V.I.S</div><div class="tdots"><span></span><span></span><span></span></div>`;
  chatEl.appendChild(d); chatEl.scrollTop = chatEl.scrollHeight;
}
function removeThinking() { const t=document.getElementById('thinking'); if(t) t.remove(); }
function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function wait(ms) { return new Promise(r=>setTimeout(r,ms)); }

// ── Send ──
async function sendMsg() {
  const text = txtIn.value.trim();
  if (!text) return;
  txtIn.value = ''; txtIn.blur();
  addMsg('user', text);
  hist.push({role:'user', content: currentLang==='hi' ? `[User is speaking Hindi] ${text}` : text});

  const key = apiKeyEl.value.trim();
  if (!key) {
    addThinking(); await wait(750); removeThinking();
    const rep = demoReply(text); addMsg('jarvis', rep); speak(rep);
    return;
  }

  addThinking();
  setStatus('online', currentLang==='hi'?'सोच रहा हूँ...':'PROCESSING...');
  try {
    const sysPrompt = currentLang === 'hi'
      ? `You are J.A.R.V.I.S — a sophisticated, witty personal AI assistant named RK. The user is speaking in Hindi. Always respond in Hindi (Devanagari script). Be concise, intelligent, helpful. No markdown or bullet points — natural spoken Hindi only. Max 2-3 sentences unless asked for more.`
      : `You are J.A.R.V.I.S — Just A Rather Very Intelligent System, personal assistant to RK. Sophisticated, witty, refined British demeanor like the Marvel version. Keep responses under 3 sentences unless asked for more. No markdown or bullet points — natural spoken language only.`;

    const messages = [
      { role: 'system', content: sysPrompt },
      ...hist
    ];

    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${key}`
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: messages,
        max_tokens: 500,
        temperature: 0.8
      })
    });
    const data = await res.json();
    removeThinking();
    if (data.error) {
      const err = currentLang==='hi' ? 'त्रुटि: '+data.error.message : 'Error: '+data.error.message;
      addMsg('jarvis',err); speak(err); setStatus('error','API ERROR'); return;
    }
    const rep = data.choices?.[0]?.message?.content || 'No response';
    hist.push({role:'assistant', content:rep});
    addMsg('jarvis', rep); speak(rep);
    setStatus('online', currentLang==='hi'?'सिस्टम चालू · आदेश की प्रतीक्षा':'SYSTEM ONLINE · AWAITING COMMAND');
  } catch(e) {
    removeThinking();
    const err = currentLang==='hi' ? 'कनेक्शन विफल। API key और नेटवर्क जांचें।' : 'Connection failed. Check your API key and network.';
    addMsg('jarvis',err); speak(err); setStatus('error','CONNECTION ERROR');
  }
}

// ── Demo replies ──
function demoReply(t) {
  const tl = t.toLowerCase();
  if (currentLang === 'hi') {
    if (/नमस्ते|हेलो|हाय/.test(t))              return "नमस्ते! मैं J.A.R.V.I.S हूँ। पूरी AI शक्ति के लिए ऊपर Google Gemini API key डालें।";
    if (/समय|टाइम|वक़्त/.test(t))               return "अभी का समय है " + new Date().toLocaleTimeString('hi-IN',{hour:'2-digit',minute:'2-digit'}) + "।";
    if (/तारीख|दिनांक|आज/.test(t))              return "आज की तारीख है " + new Date().toLocaleDateString('hi-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'}) + "।";
    if (/मज़ाक|joke|चुटकुला/.test(t))            return "विज्ञानी atoms पर भरोसा क्यों नहीं करते? क्योंकि वो सब कुछ बना देते हैं! मैं केवल सच बोलता हूँ।";
    if (/मौसम|weather/.test(t))                 return "मौसम की जानकारी के लिए API key चाहिए। कृपया ऊपर दर्ज करें।";
    if (/तुम कौन|आप कौन|तुम्हारा नाम/.test(t))  return "मैं J.A.R.V.I.S हूँ — RK का व्यक्तिगत बुद्धिमान सहायक। सेवा में हाज़िर हूँ।";
    return "समझ गया। पूरी AI सेवाओं के लिए ऊपर Google Gemini API key डालें।";
  } else {
    if (/hello|hi\b|hey/.test(tl))              return "Good day. I am J.A.R.V.I.S. Paste your Anthropic API key above to unlock my full intelligence.";
    if (/\btime\b/.test(tl))                    return "It is currently "+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+". Anything else?";
    if (/\bdate\b|today/.test(tl))              return "Today is "+new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})+".";
    if (/joke/.test(tl))                        return "Why don't scientists trust atoms? Because they make up everything. Unlike me — I deal only in facts.";
    if (/weather/.test(tl))                     return "Weather requires live data. Provide an API key and I shall fetch it at once.";
    if (/who are you|your name/.test(tl))       return "I am J.A.R.V.I.S — Just A Rather Very Intelligent System. At your service.";
    if (/how are you|you doing/.test(tl))       return "Operating at full capacity. All systems nominal, as always.";
    return "Understood. Enter your Anthropic API key above for full AI responses. In demo mode I handle basic queries only.";
  }
}

// ── Event listeners ──
micBtn.addEventListener('click', function(e) {
  e.preventDefault();
  e.stopPropagation();
  toggleListen();
});

coreWrap.addEventListener('click', function(e) {
  e.preventDefault();
  toggleListen();
});

sendBtn.addEventListener('click', function(e) {
  e.preventDefault();
  sendMsg();
});

txtIn.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); sendMsg(); }
});
